<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZVONKY</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #000; --accent: #b388ff; --glass: rgba(255,255,255,0.03); --border: rgba(179,136,255,0.2); }
        * { cursor: none !important; font-family: 'Inter', sans-serif; box-sizing: border-box; }
        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg); color: #fff; overflow: hidden; }
        
        #cursor { width: 8px; height: 8px; background: var(--accent); border-radius: 50%; position: fixed; pointer-events: none; z-index: 9999; box-shadow: 0 0 15px var(--accent); transform: translate(-50%, -50%); }

        /* AUTH */
        #auth { height: 100vh; display: flex; justify-content: center; align-items: center; background: radial-gradient(circle at center, #1a0b2e 0%, #000 100%); }
        .auth-card { background: var(--glass); backdrop-filter: blur(25px); padding: 50px; border-radius: 40px; border: 1px solid var(--border); text-align: center; width: 400px; box-shadow: 0 25px 50px rgba(0,0,0,0.8); }
        .logo-img { width: 120px; border-radius: 25px; margin-bottom: 25px; border: 1px solid var(--border); }
        h1 { font-family: 'Montserrat'; font-weight: 900; letter-spacing: 5px; margin: 0 0 30px 0; font-size: 32px; color: #fff; }
        input { width: 100%; padding: 16px; margin: 10px 0; background: rgba(255,255,255,0.05); border: 1px solid transparent; border-radius: 12px; color: var(--accent); text-align: center; outline: none; transition: 0.3s; font-weight: 700; }
        input:focus { border-color: var(--accent); background: rgba(255,255,255,0.08); }
        .btn-distro { width: 100%; padding: 18px; background: var(--accent); border: none; border-radius: 12px; color: #000; font-weight: 900; letter-spacing: 2px; cursor: pointer; text-transform: uppercase; margin-top: 20px; transition: 0.3s; }
        .btn-distro:hover { transform: scale(1.02); filter: brightness(1.1); }

        /* APP LAYOUT */
        #app { display: none; height: 100vh; grid-template-columns: 320px 1fr; }
        aside { background: #050505; border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        .u-item { padding: 25px 35px; transition: 0.3s; border-bottom: 1px solid rgba(255,255,255,0.02); font-weight: 700; opacity: 0.4; font-size: 13px; letter-spacing: 1px; }
        .u-item:hover, .u-item.active { background: var(--glass); opacity: 1; color: var(--accent); border-left: 4px solid var(--accent); }

        main { display: flex; flex-direction: column; position: relative; background: #000; }
        .nav { padding: 25px 40px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.5); backdrop-filter: blur(10px); }
        
        #chat-window { flex: 1; padding: 40px; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; scroll-behavior: smooth; }
        .msg { padding: 16px 24px; border-radius: 24px; max-width: 65%; font-size: 15px; line-height: 1.5; position: relative; }
        .msg b { display: block; font-size: 10px; color: var(--accent); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 1px; }
        .m-in { background: var(--glass); align-self: flex-start; border: 1px solid rgba(255,255,255,0.05); }
        .m-out { background: var(--accent); color: #000; align-self: flex-end; font-weight: 600; box-shadow: 0 5px 15px rgba(179,136,255,0.2); }

        /* CUSTOM VOICE PLAYER */
        .voice-player { display: flex; align-items: center; gap: 12px; min-width: 180px; }
        .play-btn { background: none; border: none; font-size: 22px; color: inherit; cursor: pointer; padding: 0; }
        .wave { flex: 1; height: 3px; background: rgba(0,0,0,0.1); border-radius: 2px; position: relative; }
        .m-in .wave { background: rgba(255,255,255,0.1); }
        
        /* INPUT AREA */
        .input-area { padding: 35px 45px; border-top: 1px solid var(--border); display: flex; gap: 25px; align-items: center; }
        .msg-input { flex: 1; background: var(--glass); border: 1px solid var(--border); border-radius: 35px; padding: 18px 28px; color: #fff; outline: none; font-size: 15px; }
        #voicemail { font-size: 28px; background: none; border: none; color: var(--accent); transition: 0.3s; }
        #voicemail.recording { color: #ff4d4d; transform: scale(1.3); filter: drop-shadow(0 0 15px #ff4d4d); }

        /* CALL UI */
        #call-ui { position: absolute; inset: 0; background: #000; z-index: 5000; display: none; flex-direction: column; }
        .v-grid { flex: 1; display: grid; grid-template-columns: 1fr 1fr; gap: 25px; padding: 35px; }
        video { width: 100%; height: 100%; object-fit: cover; border-radius: 35px; border: 1px solid var(--accent); background: #0a0a0a; }
    </style>
</head>
<body>
    <div id="cursor"></div>

    <div id="auth">
        <div class="auth-card">
            <img src="flux-2-max-20251222_b_Сделай_теперь_логоти.jpeg" class="logo-img" alt="Zvonky Logo">
            <h1>ZVONKY</h1>
            <input type="text" id="login" placeholder="USERNAME">
            <input type="password" id="pass" placeholder="PASSWORD">
            <button class="btn-distro" onclick="init()">AUTHENTICATE</button>
        </div>
    </div>

    <div id="app">
        <aside id="contacts-list">
            <div style="padding: 35px; font-family: 'Montserrat'; font-weight: 900; color: var(--accent); font-size: 14px; letter-spacing: 3px;">SYSTEM.CORE</div>
        </aside>
        <main>
            <div id="call-ui">
                <div class="v-grid"><video id="localVid" autoplay muted></video><video id="remoteVid" autoplay></video></div>
                <div style="height:140px; display:flex; justify-content:center; align-items:center;">
                    <button class="btn-distro" style="width:100px; background:#ff4d4d;" onclick="hangup()">END</button>
                </div>
            </div>
            
            <div class="nav">
                <span id="chat-title" style="font-weight: 900; color: var(--accent); font-size: 13px; letter-spacing: 2px;">SECURE CHANNEL</span>
                <button id="call-btn" onclick="startCall()" style="background:none; border:none; color:var(--accent); font-size:24px; display:none;">📞</button>
            </div>

            <div id="chat-window"></div>

            <div class="input-area">
                <button id="voicemail">🎙️</button>
                <input type="text" id="msg-input" class="msg-input" placeholder="ENCRYPT MESSAGE...">
                <button class="btn-distro" style="width:auto; padding: 14px 35px; margin:0;" onclick="send()">SEND</button>
            </div>
        </main>
    </div>

    <script>
        const SB_URL = 'https://fgtbyehvahnhhcsyhtjk.supabase.co';
        const SB_KEY = 'sb_publishable_AlR-LagSybFUYS5XSyGIug_52ZyF9cW';
        const _supabase = supabase.createClient(SB_URL, SB_KEY);

        const ACCOUNTS = { "azer": "zvonkygive00", "maraby": "zvonkygive00", "nur": "zvonkygive", "azerslow": "zvonkygive00" };
        let me = "", currentTarget = null, peer = null, localStream = null, mediaRecorder, audioChunks = [];

        // CURSOR
        document.addEventListener('mousemove', e => { 
            const c = document.getElementById('cursor'); 
            c.style.left = e.clientX + 'px'; c.style.top = e.clientY + 'px'; 
        });

        async function init() {
            const u = document.getElementById('login').value.toLowerCase().trim();
            const p = document.getElementById('pass').value;
            if (ACCOUNTS[u] === p) {
                me = u; document.getElementById('auth').style.display = 'none'; document.getElementById('app').style.display = 'grid';
                renderContacts();
                peer = new Peer(me + "-zvonky-final-fix");
                peer.on('call', c => { if(confirm("Входящий вызов...")) answerCall(c); });
                subscribe();
            } else alert("INVALID CREDENTIALS");
        }

        function renderContacts() {
            const list = document.getElementById('contacts-list');
            ["azer", "maraby", "nur", "azerslow"].forEach(user => {
                if(user === me) return;
                const div = document.createElement('div');
                div.className = 'u-item'; div.id = `u-${user}`; div.innerText = `@${user.toUpperCase()}`;
                div.onclick = () => selectChat(user);
                list.appendChild(div);
            });
        }

        async function selectChat(user) {
            currentTarget = user;
            document.getElementById('chat-title').innerText = `ENCRYPTED: @${user.toUpperCase()}`;
            document.getElementById('call-btn').style.display = 'block';
            document.querySelectorAll('.u-item').forEach(el => el.classList.remove('active'));
            document.getElementById(`u-${user}`).classList.add('active');
            document.getElementById('chat-window').innerHTML = '';
            const { data } = await _supabase.from('messages').select('*')
                .or(`and(sender.eq.${me},receiver.eq.${currentTarget}),and(sender.eq.${currentTarget},receiver.eq.${me})`)
                .order('created_at', { ascending: true });
            if(data) data.forEach(m => renderMsg(m.sender, m.content));
        }

        function subscribe() {
            _supabase.channel('messages').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, 
            p => { if (p.new.sender === currentTarget && p.new.receiver === me) renderMsg(p.new.sender, p.new.content); }).subscribe();
        }

        async function send() {
            const txt = document.getElementById('msg-input').value;
            if(!txt || !currentTarget) return;
            renderMsg(me, txt);
            await _supabase.from('messages').insert([{ sender: me, receiver: currentTarget, content: txt }]);
            document.getElementById('msg-input').value = "";
        }

        function renderMsg(user, text) {
            const win = document.getElementById('chat-window');
            const div = document.createElement('div');
            div.className = `msg ${user === me ? 'm-out' : 'm-in'}`;
            
            if (text.startsWith('[VOICE]:')) {
                const url = text.split('[VOICE]:')[1];
                div.innerHTML = `<b>${user}</b>
                <div class="voice-player">
                    <button class="play-btn" onclick="togglePlay(this)">▶️</button>
                    <audio src="${url}" onended="this.previousElementSibling.innerText='▶️'"></audio>
                    <div class="wave"></div>
                </div>`;
            } else { div.innerHTML = `<b>${user}</b>${text}`; }
            
            win.appendChild(div); win.scrollTop = win.scrollHeight;
        }

        function togglePlay(btn) {
            const audio = btn.nextElementSibling;
            if(audio.paused) { audio.play(); btn.innerText = '⏸️'; } 
            else { audio.pause(); btn.innerText = '▶️'; }
        }

        // VOICE RECORDING
        const vBtn = document.getElementById('voicemail');
        vBtn.onmousedown = async () => {
            if(!currentTarget) return;
            try {
                const s = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(s); audioChunks = [];
                mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                mediaRecorder.onstop = async () => {
                    const blob = new Blob(audioChunks, { type: 'audio/mpeg' });
                    const fName = `${Date.now()}.mp3`;
                    await _supabase.storage.from('voicemails').upload(fName, blob);
                    const { data } = _supabase.storage.from('voicemails').getPublicUrl(fName);
                    renderMsg(me, `[VOICE]:${data.publicUrl}`);
                    await _supabase.from('messages').insert([{ sender: me, receiver: currentTarget, content: `[VOICE]:${data.publicUrl}` }]);
                };
                mediaRecorder.start(); vBtn.classList.add('recording');
            } catch(e) { alert("Mic error"); }
        };
        window.onmouseup = () => { if(mediaRecorder?.state === "recording") { mediaRecorder.stop(); vBtn.classList.remove('recording'); }};

        // CALLS
        async function startCall() {
            document.getElementById('call-ui').style.display = 'flex';
            localStream = await navigator.mediaDevices.getUserMedia({video: true, audio: true});
            document.getElementById('localVid').srcObject = localStream;
            const c = peer.call(currentTarget + "-zvonky-final-fix", localStream);
            c.on('stream', rs => document.getElementById('remoteVid').srcObject = rs);
        }
        async function answerCall(c) {
            document.getElementById('call-ui').style.display = 'flex';
            localStream = await navigator.mediaDevices.getUserMedia({video: true, audio: true});
            document.getElementById('localVid').srcObject = localStream;
            c.answer(localStream);
            c.on('stream', rs => document.getElementById('remoteVid').srcObject = rs);
        }
        function hangup() { document.getElementById('call-ui').style.display = 'none'; if(localStream) localStream.getTracks().forEach(t => t.stop()); }
        document.getElementById('msg-input').onkeypress = (e) => { if(e.key==='Enter') send(); };
    </script>
</body>
</html>
