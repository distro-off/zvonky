<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZVONKY | PRIVATE BETA</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --bg: #050505; --panel: #111; --accent: #b388ff; --text: #fff; --red: #ff4d4d; }
        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; overflow: hidden; }
        
        /* AUTH */
        #auth { height: 100vh; display: flex; justify-content: center; align-items: center; background: radial-gradient(circle, #1a0b2e, #050505); }
        .auth-card { background: var(--panel); padding: 40px; border-radius: 30px; text-align: center; border: 1px solid #222; width: 300px; box-shadow: 0 10px 40px rgba(0,0,0,0.8); }
        .auth-card h1 { color: var(--accent); letter-spacing: 5px; margin-bottom: 30px; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #333; color: var(--accent); border-radius: 10px; box-sizing: border-box; outline: none; }
        .btn-main { width: 100%; padding: 12px; background: var(--accent); border: none; border-radius: 10px; font-weight: 900; cursor: pointer; transition: 0.3s; }
        .btn-main:hover { opacity: 0.8; transform: translateY(-2px); }

        /* APP LAYOUT */
        #app { display: none; height: 100vh; grid-template-columns: 260px 1fr; }
        aside { background: var(--panel); border-right: 1px solid #1a1a1a; display: flex; flex-direction: column; }
        .u-item { padding: 15px 20px; cursor: pointer; border-bottom: 1px solid #0a0a0a; transition: 0.3s; font-size: 14px; }
        .u-item:hover { background: #181818; color: var(--accent); }

        /* CHAT WINDOW */
        main { display: flex; flex-direction: column; position: relative; background: #080808; }
        #chat-window { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
        
        .msg { padding: 12px 16px; border-radius: 20px; max-width: 75%; line-height: 1.4; animation: slideUp 0.2s ease; }
        .msg b { display: block; font-size: 11px; margin-bottom: 4px; color: var(--accent); text-transform: uppercase; }
        .m-in { background: #1a1a1a; align-self: flex-start; border-bottom-left-radius: 4px; }
        .m-out { background: var(--accent); color: #000; align-self: flex-end; border-bottom-right-radius: 4px; }

        /* CALL OVERLAY */
        #call-ui { position: absolute; inset: 0; background: #000; z-index: 1000; display: none; flex-direction: column; }
        .video-grid { flex: 1; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 20px; }
        .v-slot { background: #111; border-radius: 25px; overflow: hidden; border: 1px solid #222; position: relative; }
        video { width: 100%; height: 100%; object-fit: cover; }

        .call-bar { height: 100px; display: flex; justify-content: center; align-items: center; gap: 20px; background: rgba(10,10,10,0.9); }
        .c-btn { width: 55px; height: 55px; border-radius: 50%; border: none; cursor: pointer; font-size: 22px; transition: 0.3s; }
        .c-red { background: var(--red); color: #fff; }
        .c-gray { background: #333; color: #fff; }
        .c-active { background: var(--accent); color: #000; }

        .input-bar { padding: 20px; background: var(--panel); display: flex; gap: 15px; align-items: center; }
        .input-bar input { flex: 1; margin: 0; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="auth">
        <div class="auth-card">
            <h1>ZVONKY</h1>
            <input type="text" id="login" placeholder="ЛОГИН">
            <input type="password" id="pass" placeholder="ПАРОЛЬ">
            <button class="btn-main" onclick="initApp()">ENTER</button>
        </div>
    </div>

    <div id="app">
        <aside>
            <div style="padding: 25px; font-weight: 900; color: var(--accent); letter-spacing: 2px;">ZVONKY BETA</div>
            <div class="u-item">@maraby</div>
            <div class="u-item">@nur</div>
            <div class="u-item">@azerslow</div>
        </aside>
        
        <main>
            <div id="call-ui">
                <div class="video-grid">
                    <div class="v-slot"><video id="localVid" autoplay muted></video></div>
                    <div class="v-slot"><video id="remoteVid" autoplay></video></div>
                </div>
                <div class="call-bar">
                    <button class="c-btn c-gray" id="camBtn" onclick="toggleCam()">📷</button>
                    <button class="c-btn c-gray" id="micBtn" onclick="toggleMic()">🎤</button>
                    <button class="c-btn c-red" onclick="hangup()">📞</button>
                </div>
            </div>

            <div style="padding: 15px 25px; background: var(--panel); display:flex; justify-content:space-between; align-items:center; border-bottom: 1px solid #1a1a1a;">
                <span id="target" style="font-weight:bold; color:var(--accent);"># general_chat</span>
                <button onclick="startCall()" style="background:none; border:none; cursor:pointer; font-size:24px; color:var(--accent);">📞</button>
            </div>
            
            <div id="chat-window"></div>
            
            <div class="input-bar">
                <button style="background:none; border:none; font-size:24px; cursor:pointer; color:var(--accent);">🎙️</button>
                <input type="text" id="msg" placeholder="Написать сообщение...">
                <button class="btn-main" style="width:auto; padding: 10px 25px;" onclick="send()">SEND</button>
            </div>
        </main>
    </div>

    <script>
        // ТВОИ ДАННЫЕ SUPABASE
        const SB_URL = 'https://fgtbyehvahnhhcsyhtjk.supabase.co';
        const SB_KEY = 'sb_publishable_AlR-LagSybFUYS5XSyGIug_52ZyF9cW';
        const _supabase = supabase.createClient(SB_URL, SB_KEY);
        
        const ACCOUNTS = { 
            "azer": "zvonkygive00", 
            "maraby": "zvonkygive00", 
            "nur": "zvonkygive", 
            "azerslow": "zvonkygive00" 
        };

        let me = "";
        let peer = null;
        let localStream = null;

        async function initApp() {
            const u = document.getElementById('login').value.toLowerCase();
            const p = document.getElementById('pass').value;
            
            if (ACCOUNTS[u] === p) {
                me = u;
                document.getElementById('auth').style.display = 'none';
                document.getElementById('app').style.display = 'grid';
                
                // Звонки через PeerJS
                peer = new Peer(me + "-zvonky-v1"); 
                peer.on('call', call => {
                    if(confirm("Входящий звонок от друга! Ответить?")) {
                        answerCall(call);
                    }
                });
                
                loadHistory();
                subscribeToUpdates();
            } else { alert("Доступ запрещен!"); }
        }

        async function loadHistory() {
            const { data } = await _supabase.from('messages').select('*').order('created_at', { ascending: true });
            if(data) data.forEach(m => renderMessage(m.sender, m.content));
        }

        function subscribeToUpdates() {
            _supabase.channel('public:messages').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, 
            payload => { 
                if(payload.new.sender !== me) renderMessage(payload.new.sender, payload.new.content); 
            }).subscribe();
        }

        async function send() {
            const txt = document.getElementById('msg').value;
            if(!txt) return;
            renderMessage(me, txt);
            await _supabase.from('messages').insert([{ sender: me, content: txt }]);
            document.getElementById('msg').value = "";
        }

        function renderMessage(user, text) {
            const win = document.getElementById('chat-window');
            const div = document.createElement('div');
            div.className = `msg ${user === me ? 'm-out' : 'm-in'}`;
            div.innerHTML = `<b>${user}</b>${text}`;
            win.appendChild(div);
            win.scrollTop = win.scrollHeight;
        }

        // ЗВОНКИ
        async function startCall() {
            document.getElementById('call-ui').style.display = 'flex';
            localStream = await navigator.mediaDevices.getUserMedia({video: true, audio: true});
            document.getElementById('localVid').srcObject = localStream;

            const friend = prompt("Кому звоним? (maraby / nur / azerslow / azer)");
            if(!friend) return hangup();
            
            const call = peer.call(friend + "-zvonky-v1", localStream);
            call.on('stream', rs => document.getElementById('remoteVid').srcObject = rs);
        }

        async function answerCall(incoming) {
            document.getElementById('call-ui').style.display = 'flex';
            localStream = await navigator.mediaDevices.getUserMedia({video: true, audio: true});
            document.getElementById('localVid').srcObject = localStream;
            
            incoming.answer(localStream);
            incoming.on('stream', rs => document.getElementById('remoteVid').srcObject = rs);
        }

        function hangup() {
            document.getElementById('call-ui').style.display = 'none';
            if(localStream) localStream.getTracks().forEach(t => t.stop());
        }

        function toggleCam() {
            const t = localStream.getVideoTracks()[0];
            t.enabled = !t.enabled;
            document.getElementById('camBtn').classList.toggle('c-active');
        }

        function toggleMic() {
            const t = localStream.getAudioTracks()[0];
            t.enabled = !t.enabled;
            document.getElementById('micBtn').classList.toggle('c-active');
        }

        document.getElementById('msg').onkeypress = (e) => { if(e.key==='Enter') send(); };
    </script>
</body>
</html>
